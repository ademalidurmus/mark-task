<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarkTask</title>
    <!-- Use Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    <div class="drag-region"></div>
    
    <div class="app-container">
        <header>
            <div class="header-top">
                <h1>MarkTask</h1>
                <div class="filter-container">
                    <select id="tag-filter">
                        <option value="all">All Tags</option>
                    </select>
                </div>
            </div>
            <p id="task-count">0 tasks pending</p>
        </header>

        <main>
            <ul id="todo-list">
                <!-- Todo items will be injected here -->
            </ul>
        </main>

        <footer>
            <form id="todo-form">
                <input type="text" id="todo-input" placeholder="Add a new task..." autocomplete="off" required>
                <button type="button" id="advanced-add-btn" title="Detailed Add">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <polyline points="9 21 3 21 3 15"></polyline>
                        <line x1="21" y1="3" x2="14" y2="10"></line>
                        <line x1="3" y1="21" x2="10" y2="14"></line>
                    </svg>
                </button>
                <button type="submit" id="add-btn" title="Quick Add">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                </button>
            </form>
        </footer>
    </div>

    <!-- Modal for Detailed Task Adding -->
    <div id="add-task-modal" class="modal-overlay hidden">
        <div class="modal-container">
            <h2 id="modal-heading">Add Detailed Task</h2>
            <form id="detailed-todo-form">
                <div class="form-group">
                    <label for="modal-title">Title</label>
                    <input type="text" id="modal-title" placeholder="Task title..." required>
                </div>
                <div class="form-group">
                    <label for="modal-desc">Description</label>
                    <div class="editor-toolbar">
                        <button type="button" class="toolbar-btn" data-type="bold" title="Bold">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></svg>
                        </button>
                        <button type="button" class="toolbar-btn" data-type="italic" title="Italic">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"></line><line x1="14" y1="20" x2="5" y2="20"></line><line x1="15" y1="4" x2="9" y2="20"></line></svg>
                        </button>
                        <button type="button" class="toolbar-btn" data-type="h1" title="Heading 1">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h8"></path><path d="M4 18V6"></path><path d="M12 18V6"></path><path d="M17 12l3-2v8"></path></svg>
                        </button>
                        <button type="button" class="toolbar-btn" data-type="h2" title="Heading 2">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12h8"></path><path d="M4 18V6"></path><path d="M12 18V6"></path><path d="M21 18h-4c0-4 4-3 4-6 0-1.5-2-2.5-4-1"></path></svg>
                        </button>
                        <div class="toolbar-separator"></div>
                        <button type="button" class="toolbar-btn" data-type="list" title="Bullet List">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"></line><line x1="8" y1="12" x2="21" y2="12"></line><line x1="8" y1="18" x2="21" y2="18"></line><line x1="3" y1="6" x2="3.01" y2="6"></line><line x1="3" y1="12" x2="3.01" y2="12"></line><line x1="3" y1="18" x2="3.01" y2="18"></line></svg>
                        </button>
                        <button type="button" class="toolbar-btn" data-type="tasklist" title="Task List">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><polyline points="9 11 12 14 22 4"></polyline></svg>
                        </button>
                        <button type="button" class="toolbar-btn" data-type="link" title="Link">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
                        </button>
                        <button type="button" class="toolbar-btn" data-type="code" title="Code Block">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></svg>
                        </button>
                    </div>
                    <textarea id="modal-desc" placeholder="Details, notes, subtasks, or links..."></textarea>
                </div>
                <div class="form-group">
                    <label>Tags</label>
                    <div class="tag-input-wrapper token-container" id="modal-tag-container">
                        <input type="text" id="modal-tags" class="token-input" placeholder="Work, Personal..." autocomplete="off">
                        <div class="token-badges" id="modal-tag-badges"></div>
                        <div id="modal-autocomplete-list" class="autocomplete-items"></div>
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" id="modal-cancel-btn" class="cancel-btn">Cancel</button>
                    <button type="submit" id="modal-save-btn" class="confirm-btn">Save</button>
                </div>
            </form>
        </div>
    </div>
    <!-- Context Menu -->
    <div id="context-menu" class="context-menu hidden">
        <div class="context-menu-item" id="ctx-edit">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
            Edit
        </div>
        <div class="context-menu-item" id="ctx-toggle">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            <span>Mark as Done</span>
        </div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item danger" id="ctx-delete">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
            Delete
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module" src="js/renderer.js"></script>
</body>
</html>
